<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Der Rätsel-Galgen</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            overflow: hidden;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
            margin: 20px auto;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            margin: auto;
            box-sizing: border-box;
        }

        h1 { color: #4a4a4a; margin-bottom: 0 0 0.5rem 0; font-size: clamp(1rem, 5vw, 1.5rem); /* Schrift skalliert mit */ }

        #hangman-svg {
            width: auto;
            height: clamp(80px, 15vh, 130px);
            background: #f8f9fa;
            border-radius: 12px;
            margin: 0 auto 0.5rem auto;
            flex-shrink: 0;
        }

        .word-display {
            font-size: clamp(1.2rem, 6vw, 2rem);
            letter-spacing: 0.2rem;
            margin: 0.5rem 0;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #2d3436
        }

        .hint {
            background: #e9ecef;
            padding: 0.6rem;
            border-radius: 8px;
            font-style: italic;
            color: #495057;
            margin-bottom: 0.5rem;
            border-left: 4px solid #111527;
            font-size: 0.85rem;
        }

        #keyboard{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            margin-top: 0.5rem;
        }

        .key {
            flex: 0 1 calc(10% - 4px);
            min-width: 28px;
            height: 35px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.1s, background 0.2s;
            touch-action: manipulation;
        }

        .key:hover { background: #764ba2; transform: translateY(-2px); }
        .key:disabled { background: #ced4da; cursor: not-allowed; transform: none; }

        #message {
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 1.5rem;
            min-height: 1.6rem;
        }

        @media (min-width: 768px) {
            .game-card { padding: 2rem; }
            .word-display { letter-spacing: 0.5rem; }
            .key { height: 45px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>Der Rätsel-Galgen</h1>
        
        <svg id="hangman-svg" viewBox="0 0 100 100">
            <line x1="20" y1="90" x2="80" y2="90" stroke="#2d3436" stroke-width="3" />
            <line x1="30" y1="90" x2="30" y2="10" stroke="#2d3436" stroke-width="3" />
            <line x1="30" y1="10" x2="70" y2="10" stroke="#2d3436" stroke-width="3" />
            <line x1="70" y1="10" x2="70" y2="20" stroke="#2d3436" stroke-width="3" />

            <circle id="hang-head" cx="70" cy="30" r="10" stroke="#d63031" stroke-width="2" fill="none" style="display:none;" />
            <line id="hang-body" x1="70" y1="40" x2="70" y2="70" stroke="#d63031" stroke-width="2" style="display: none;" />
            <line id="hang-l-arm" x1="70" y1="50" x2="50" y2="40" stroke="#d63031" stroke-width="2" style="display: none;" />
            <line id="hang-r-arm" x1="70" y1="50" x2="90" y2="40" stroke="#d63031" stroke-width="2" style="display: none;" />
            <line id="hang-l-leg" x1="70" y1="70" x2="50" y2="85" stroke="#d63031" stroke-width="2" style="display: none;" />
            <line id="hang-r-leg" x1="70" y1="70" x2="90" y2="85" stroke="#d63031" stroke-width="2" style="display: none;" />
        </svg>

        <div class="hint" id="hint-display">Lade Rätsel...</div>
        <div class="word-display" id="word-display">_ _ _ _ _</div>

        <input type="text" id="letter-input" maxlength="1" style="opacity: 0; position: absolute;">

        <div id="keyboard"></div>

        <p id="message"></p>

        <button id="restart-btn" onclick="spielStarten()" style="display: none; background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer;">Nächstes Rätsel</button>
    </div>
    <script>
        const raetselListe = [
        { wort: "KAMM", hinweis: "Ich habe Zähne, kann aber nicht beißen." },
        { wort: "FLASCHE", hinweis: "Ich habe einen Hals, aber keinen Kopf." },
        { wort: "SCHATTEN", hinweis: "Ich folge dir den ganzen Tag, doch im Dunkeln bin ich weg." },
        { wort: "SPIEGEL", hinweis: "Ich zeige dir alles, was du vor mich hältst, sag aber nie ein Wort" },
        { wort: "UHR", hinweis: "Ich habe ein Gesicht, aber keine Augen und Hände. Aber kleine Arme" },
        { wort: "FEUER", hinweis: "Ich brauche Luft zum Atmen, aber Wasser bringt mich um" },
        { wort: "KLAVIER", hinweis: "Ich habe viele Tasten, kann aber keine Tür öffnen." },
        { wort: "BUCH", hinweis: "Ich habe viele Blätter, bin aber kein Baum." },
        { wort: "WIND", hinweis: "Ich habe keine Flügel, aber ich fliege. Ich habe keinen Mund, aber ich heule." },
        { wort: "ZUKUNFT", hinweis: "Jeder hat mich, aber niemand hat mich je gesehen oder wird mich je sehen." },
        { wort: "STILL", hinweis: "Sobald man meinen Namen ausspricht, bin ich weg." },
        { wort: "SCHNEEMANN", hinweis: "Ich stehe im Garten, habe eine Karottennase und Angst vor der Sonne." },
        { wort: "ECHO", hinweis: "Ich antworte dir immer, obwohl ich keine eigene Meinung habe." },
        { wort: "REGEN", hinweis: "Ich falle, aber ich verletzte mich nie" },
        { wort: "TREPPE", hinweis: "Ich führe dich nach oben und unten, bewege mich aber niemals" },
        { wort: "NAGEL", hinweis: "Ich habe einen Kopf aber kein Gehirn" },
        { wort: "ZAUN", hinweis: "Ich laufe um den ganzen Garten, bewege mich aber nicht vom Fleck" },
        { wort: "ANKER", hinweis: "Ich werde geworfen wenn man mich braucht und aufgehoben wenn man fertig ist." },
        { wort: "RADIERGUMMI", hinweis: "Ich werde immer kleiner, je mehr Fehler du machst" },
        { wort: "PROGRAMMIEREN", salat: true },
        { wort: "TASTATUR", salat: true },
        { wort: "KAFFEPAUSE", salat: true },
        { wort: "ZIRKUSZELT", salat: true },
        { wort: "MARKENWELT", salat: true },
        { wort: "LASGNE", salat: true },
        { wort: "SONNENUNTERGANG", salat: true },
        { wort: "MORGENLUFT", salat: true },
        { wort: "VOLLMOND", salat: true },
        { wort: "BLAUWAL", salat: true },
        { wort: "MONDSCHEIN", salat: true },
        { wort: "WÜSTENSAND", salat: true },
        { wort: "BLÜTENDUFT", salat: true },
        { wort: "AUGENFARBE", salat: true },
        { wort: "BROTAUFSTRICH", salat: true },
        { wort: "PAUSENGLOCKE", salat: true },
        { wort: "FISCHE", salat: true },
        { wort: "HONIGTOPF", salat: true },
        { wort: "HANDSCHUHE", salat: true },
        { wort: "GRAUKÄSE", salat: true },
        { wort: "WURSTSALAT", salat: true },
        { wort: "KONDITOR", salat: true },
        ];

        // Variablen für den Spielzustand
        let gewaehltesWort = "";
        let anzeigeWort = [];
        let fehler = 0;
        const maxFehler = 6;
        let letzterindex = -1; 

        function spielStarten() {
            let index;

            // 1. Ein zufälliges Rätsel auswählen
            // Math.random() gibt eine Zahl zwischen 0 und 1
            // Math. floor rundet ab, damit wir eine ganze Zahl für den index bekommen
            // Solange Würfeln, bis ein ANDERER Index als beim letzten Mal kommt.
            do {
                index = Math.floor(Math.random() * raetselListe.length);
            } while (index === letzterindex && raetselListe.length > 1);
            
            letzterIndex = index;

            const aktuellesRaetsel = raetselListe[index];

            // 2. Das Wort und den Hinweis speichern
            // Wandeln des Worts zur Sicherheit in GRUßBUCHSTABEN um
            gewaehltesWort = aktuellesRaetsel.wort.toUpperCase();
            
            // Prüfung ob Rätsel oder Buchstaben-Salat
            let anzeigeText = "";
            if (aktuellesRaetsel.salat) {
                //Wir mischen das Wort für die Anzeige
                const gemischt = schuettelWort(gewaehltesWort);
                anzeigeText = "Buchstabensalat: " + gemischt;
            }else {
                // Normaler Hinweis
                anzeigeText = aktuellesRaetsel.hinweis;
            }
            document.getElementById("hint-display").innerText = anzeigeText

            // 3. Das Anzeige-Array mit Unterstrichen füllen
            anzeigeWort = [];
            for (let i = 0; i < gewaehltesWort.length; i++) {
                anzeigeWort.push("_");
            }

            // 4. Die HTML-Elemente aktualisieren, damit man auf dem Bildschirm was sieht
            document.getElementById("word-display").innerText = anzeigeWort.join(" ");

            // 5. Nachrichten löschen (falls noch was vom alten Spiel da steht)
            document.getElementById("message").innerText = "";
            fehler = 0;

            const teile = ["hang-head", "hang-body", "hang-l-arm", "hang-r-arm", "hang-l-leg", "hang-r-leg"];
            teile.forEach(id => {
                document.getElementById(id).style.display = "none";
            });

            document.getElementById("restart-btn").style.display = "none";

            erstelleTastatur();
        }
        spielStarten();

        function checkLetter(buchstabe) {
            // 1. Sicherheit: Nichts weitermachen, wenn Spiele vorbai oder Buchstabe schon da.
            if (fehler >= maxFehler || anzeigeWort.includes(buchstabe)) return;

            let treffer = false;

            // 2. Die Prüfung 
            for (let i = 0; i < gewaehltesWort.length; i++) {
                if (gewaehltesWort[i] === buchstabe) {
                    anzeigeWort[i] = buchstabe;
                    treffer = true;
                }
            }

            // 3. Anzeige aktualisieren
            document.getElementById("word-display").innerText = anzeigeWort.join(" ");

            // 4. Gewinn/Verlust Logik
            if (treffer) {
                if (!anzeigeWort.includes("_")) {
                    document.getElementById("message").innerText = "GEWONNEN! 🎉";
                    document.getElementById("restart-btn").style.display = "inline-block";
                }
            } else {
                fehler++;
                updateHangmann();
                if (fehler >= maxFehler) {
                    document.getElementById("message").innerText = "VERLOREN! Wort:  " + gewaehltesWort;
                    document.getElementById("restart-btn").style.display = "inline-block";
                }
            }
        }

        function updateHangmann() {
            if (fehler === 1) {
                document.getElementById("hang-head").style.display = "block";
            }

            if (fehler === 2) {
                document.getElementById("hang-body").style.display = "block";
            }

            if (fehler === 3) {
                document.getElementById("hang-l-arm").style.display = "block";
            }
            
            if (fehler === 4) {
                document.getElementById("hang-r-arm").style.display = "block";
            }

            if (fehler === 5) {
                document.getElementById("hang-l-leg").style.display = "block";
            }

            if (fehler === 6) {
                document.getElementById("hang-r-leg").style.display = "block";
            }
        }
        function erstelleTastatur() {
            const tastaturDiv = document.getElementById("keyboard");
            tastaturDiv.innerHTML = ""; // Altes Keyboad löschen
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜß";

            alphabet.split("").forEach(buchstabe => {
                const btn = document.createElement("button");
                btn.innerText = buchstabe;
                btn.className = "key";
                btn.onclick = () => {
                    btn.disabled = true; // Button deaktivieren nach Klick
                    checkLetter(buchstabe); // Buchstabe prüfen
                };
                tastaturDiv.appendChild(btn);
            });
        }

        // Teil für Eingabe mit echter Tastatur
        document.addEventListener("keydown", (event) => {
            const taste = event.key.toUpperCase();
            if (taste.match(/^[A-Z]$/)) {
                const buttons = document.querySelectorAll(".key");
                buttons.forEach(btn => {
                    if (btn.innerText === taste && !btn.disabled) {
                        btn.disabled = true;
                        checkLetter(taste);
                    }
                })
            }
        })

        function schuettelWort(wort) {
            let buchstaben = wort.split("");
            // Verschärfung: 4 Buchstaben die NICHT zum Wortgehören hinzufügen
            const extraAlphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜß";
            for(let i=0; i<4; i++) {
                let randomLetter = extraAlphabet[Math.floor(Math.random() * extraAlphabet.length)];
                // Nur hinzufügen, wenn er nicht schon im Wort ist
                buchstaben.push(randomLetter);
            }

            // DER "Fisher-Yates Shuffle" – ein Pfofi-Algoritmus zum Mischen 
            for (let i = buchstaben.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [buchstaben[i], buchstaben[j]] = [buchstaben[j], buchstaben[i]];
            }
            return buchstaben.join(" ");
        }
    </script>
</body>
</html>
